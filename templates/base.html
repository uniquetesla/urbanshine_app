<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UrbanShine{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7fb;
            --primary: #185adb;
            --surface: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --danger: #dc2626;
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 980px;
            margin: 2rem auto;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            padding: 2rem;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            color: white;
            background: var(--primary);
            font-weight: 600;
        }

        .btn.danger { background: var(--danger); }
        .btn.secondary { background: #334155; }

        .form-grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        label { font-weight: 600; display: block; margin-bottom: .3rem; }
        input, select {
            width: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
            padding: .8rem;
        }

        .messages { list-style: none; padding: 0; }
        .messages li {
            background: #e2e8f0;
            padding: .7rem;
            border-radius: 8px;
            margin-bottom: .5rem;
        }

        .login-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .login-card {
            width: min(440px, 100%);
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
            padding: 2rem;
        }

        .subtitle { color: var(--muted); margin-top: 0; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
